# Non-sensitive service-discovery config. PORT is deliberately NOT here: api-gateway
# hardcodes each downstream port as a literal in its route handlers (index.js), so PORT
# is set per-Deployment instead to avoid implying it's independently tunable.
#
# MEMBER_LB_URL is deliberately absent. api-gateway's proxyMember() falls back to
# `http://${MEMBER_IP}:3002` whenever MEMBER_LB_URL is unset - that fallback now points
# at the member-service ClusterIP Service, which load-balances across both replica pods
# on its own, replacing the old nginx upstream block with no code changes required.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: gym-fitness
data:
  IDENTITY_IP: "identity-service"
  MEMBER_IP: "member-service"
  TRAINER_IP: "trainer-service"
  WORKOUT_IP: "workout-service"
  MEMBERSHIP_IP: "membership-service"
  ATTENDANCE_IP: "attendance-service"
---
# Sensitive values. `uri` and `MONGO_URI` are two independent keys holding the identical
# connection string, because the six services are inconsistent about which env var name
# they read (identity/member/trainer/workout/attendance read `uri`; membership-service
# reads `MONGO_URI`) - populating both means every service's existing code works
# unmodified against the in-cluster Mongo instead of the old external Atlas cluster.
#
# JWT_SECRET must be byte-identical between identity-service (signs tokens) and
# api-gateway (verifies tokens) - both read it from this same Secret key.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: gym-fitness
type: Opaque
stringData:
  JWT_SECRET: "7c214689e91b3577725c582a13cc26e5f1bd47aa901de5f124d81d20eee517ac"
  MONGO_INITDB_ROOT_USERNAME: "gymadmin"
  MONGO_INITDB_ROOT_PASSWORD: "gymK8sDemo2026"
  uri: "mongodb://gymadmin:gymK8sDemo2026@mongo-service:27017/gymfitness?authSource=admin"
  MONGO_URI: "mongodb://gymadmin:gymK8sDemo2026@mongo-service:27017/gymfitness?authSource=admin"
