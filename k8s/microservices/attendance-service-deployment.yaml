apiVersion: apps/v1
kind: Deployment
metadata:
  name: attendance-service
  namespace: gym-fitness
  labels:
    app: attendance-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attendance-service
  template:
    metadata:
      labels:
        app: attendance-service
    spec:
      containers:
        - name: attendance-service
          image: attendance-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3006
          env:
            - name: PORT
              value: "3006"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
