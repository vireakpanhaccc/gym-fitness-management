# The only microservice Deployment whose Service is ever referenced by the Ingress -
# every other backend Service stays ClusterIP-only and unreachable from outside the
# cluster (see gateway-service.yaml + ingress.yaml).
#
# The api-gateway Pod demonstrates shared-volume logging with two containers:
# api-gateway writes /var/log/app/access.log, and log-reader tails the same file
# from the same in-pod Kubernetes volume.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: gym-fitness
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: gateway-logs
              mountPath: /var/log/app
        - name: log-reader
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /var/log/app && touch /var/log/app/access.log && tail -n +1 -f /var/log/app/access.log
          volumeMounts:
            - name: gateway-logs
              mountPath: /var/log/app
      volumes:
        - name: gateway-logs
          emptyDir: {}
