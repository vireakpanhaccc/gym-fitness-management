# The only microservice Deployment whose Service is ever referenced by the Ingress -
# every other backend Service stays ClusterIP-only and unreachable from outside the
# cluster (see gateway-service.yaml + ingress.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: gym-fitness
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
