# Nginx configuration for the Gym & Fitness Membership App
#
# Two jobs (see plan.md section 12):
#   1. Public port 80  -> forwards ALL client/Postman traffic to the API Gateway
#                         so every API call still passes through the gateway.
#   2. Internal port 8081 -> load balances member-service across two instances.
#                            The gateway forwards member routes here via MEMBER_LB_URL.

events {}

http {
    # Docker's embedded DNS server. Lets Nginx re-resolve container names at
    # request time so a rebuilt/restarted container (new IP) does not 502.
    resolver ${NGINX_RESOLVER} valid=10s ipv6=off;

    # Upstream pool of member-service instances for load balancing.
    # Default round-robin distributes requests across both containers.
    upstream member_service {
        server ${MEMBER_SERVICE_1_HOST}:${MEMBER_SERVICE_1_PORT};
        server ${MEMBER_SERVICE_2_HOST}:${MEMBER_SERVICE_2_PORT};
    }

    # ---- Public entry point: everything goes to the API Gateway ----
    server {
        listen 80;

        location / {
            # Hostname in a variable forces runtime DNS resolution via resolver.
            set $gateway ${API_GATEWAY_HOST}:${API_GATEWAY_PORT};
            proxy_pass http://$gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ---- Internal load balancer for member-service ----
    # Reachable inside the Docker network as http://nginx:8081
    server {
        listen 8081;

        location / {
            proxy_pass http://member_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            # Forward the gateway-injected identity headers through to the service.
            proxy_pass_request_headers on;
        }
    }
}
